<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajedrez Pro: Stockfish y Análisis</title>
    
    <!-- Configuración PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- chess.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        .board-wrapper {
            position: relative; width: 100%; max-width: 500px; margin: 0 auto; display: flex; flex-direction: row; background-color: #1e293b; padding: 4px; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .board-container {
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); width: 100%; aspect-ratio: 1; border: 2px solid #334155; border-radius: 0.25rem; overflow: hidden;
        }
        .fullscreen-mode {
            position: fixed !important; top: 0; left: 0; right: 0; bottom: 0; z-index: 40; background-color: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;
        }
        .fullscreen-mode .board-wrapper { max-width: 90vmin; max-height: 90vmin; }
        .fullscreen-mode .clock-panel { max-width: 90vmin; }

        .square { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; cursor: pointer; }
        .square-light { background-color: #ebecd0; }
        .square-dark { background-color: #739552; }
        
        .piece { width: 90%; height: 90%; background-size: contain; background-repeat: no-repeat; background-position: center; user-select: none; cursor: pointer; z-index: 10; transition: transform 0.1s; }
        
        .style-plastico .piece { filter: drop-shadow(0 3px 3px rgba(0,0,0,0.4)); }
        .style-madera .piece { filter: drop-shadow(0 3px 2px rgba(0,0,0,0.5)) sepia(0.6) saturate(1.3) hue-rotate(-10deg) brightness(0.9); }
        .style-metal .piece { filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.7)) grayscale(1) contrast(1.4) brightness(1.1); }
        .style-vidrio .piece { opacity: 0.85; filter: drop-shadow(0 0 5px rgba(255,255,255,0.6)) contrast(1.2); }

        .highlight { background-color: rgba(255, 255, 50, 0.5); }
        .last-move { background-color: rgba(255, 255, 0, 0.4); }
        .valid-move::after { content: ''; position: absolute; width: 30%; height: 30%; background-color: rgba(0, 0, 0, 0.15); border-radius: 50%; z-index: 5; }

        .clock { font-variant-numeric: tabular-nums; }
        .clock.low-time { color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .eval-bar-container { width: 24px; height: 100%; background-color: #333; display: flex; flex-direction: column; border-right: 2px solid #334155; }
        .eval-bar-black { background-color: #1e293b; width: 100%; transition: height 0.4s ease; display: flex; align-items: flex-end; justify-content: center; color: white; font-size: 0.6rem; padding-bottom: 2px; }
        .eval-bar-white { background-color: #f8fafc; width: 100%; flex-grow: 1; display: flex; align-items: flex-start; justify-content: center; color: black; font-size: 0.6rem; padding-top: 2px; }
        
        .history-scroll::-webkit-scrollbar { width: 6px; }
        .history-scroll::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 3px; }
        
        .progress-bar { transition: width 0.3s ease; }
        .badge-eval { position: absolute; top: -15%; right: -15%; width: 40%; height: 40%; max-width: 28px; max-height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: clamp(0.7rem, 4vw, 1.1rem); z-index: 20; box-shadow: 0 2px 5px rgba(0,0,0,0.8); color: white; border: 2px solid white; text-shadow: 0px 1px 2px rgba(0,0,0,0.5); }
        
        /* Análisis Responsive Board */
        .analysis-board-wrapper { width: 100%; height: 100%; aspect-ratio: 1; max-height: 65vh; margin: 0 auto; }
        @media (min-width: 768px) { .analysis-board-wrapper { max-height: 75vh; } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col items-center py-2 md:py-6 px-2">

    <div class="max-w-7xl w-full" id="main-container">
        <div class="flex flex-col lg:flex-row gap-4 lg:gap-6 justify-center items-start">
            
            <!-- Panel Izquierdo: Configuración -->
            <div id="setup-panel" class="w-full lg:w-1/4 bg-slate-800 p-4 rounded-xl shadow-lg flex flex-col gap-4 order-2 lg:order-1 border-2 border-transparent transition-colors duration-300">
                <h1 class="text-2xl font-bold text-emerald-400 border-b border-slate-700 pb-2 hidden lg:flex items-center justify-between">
                    Ajedrez Pro
                    <span id="sf-status" class="text-[0.6rem] bg-slate-700 text-slate-300 px-2 py-1 rounded-full uppercase tracking-wider">Cargando...</span>
                </h1>
                
                <div>
                    <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wide">Oponente (Negras)</label>
                    <select id="bot-difficulty" class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded focus:ring-emerald-500 focus:border-emerald-500 block p-2">
                        <option value="1">1. Mono (Aleatorio)</option>
                        <option value="2">2. Novato (Glotón - Clásico)</option>
                        <option value="3">3. Principiante (Clásico x2)</option>
                        <option value="4">4. Intermedio (Clásico x3)</option>
                        <option value="5" selected>5. Avanzado (Stockfish Lvl 1)</option>
                        <option value="6">6. Maestro (Stockfish Lvl 3)</option>
                        <option value="0">Jugador vs Jugador</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wide">Material de Piezas</label>
                    <select id="piece-style" class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded focus:ring-emerald-500 focus:border-emerald-500 block p-2">
                        <option value="plastico" selected>♟️ Plástico (Clásico)</option>
                        <option value="madera">🪵 Madera</option>
                        <option value="metal">⚙️ Metal</option>
                        <option value="vidrio">🪞 Vidrio</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wide">Control de Tiempo</label>
                    <select id="time-control" class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded focus:ring-emerald-500 focus:border-emerald-500 block p-2">
                        <option value="0" selected>Sin Límite (Inifinito)</option>
                        <option value="1,0">Bullet (1 min + 0s)</option>
                        <option value="3,2">Blitz (3 min + 2s)</option>
                        <option value="5,3">Blitz (5 min + 3s)</option>
                        <option value="10,0">Rápido (10 min + 0s)</option>
                        <option value="30,0">Clásico (30 min + 0s)</option>
                        <option value="custom">⚙️ Personalizado...</option>
                    </select>
                    <div id="custom-time-div" class="hidden grid grid-cols-2 gap-2 mt-2">
                        <div><label class="block text-xs text-slate-400">Min</label><input type="number" id="custom-min" value="15" min="1" class="w-full bg-slate-900 border border-slate-600 rounded p-1.5 text-sm"></div>
                        <div><label class="block text-xs text-slate-400">Seg</label><input type="number" id="custom-inc" value="10" min="0" class="w-full bg-slate-900 border border-slate-600 rounded p-1.5 text-sm"></div>
                    </div>
                </div>
                
                <button id="btn-new-game" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded transition duration-200 mt-2 shadow-lg">
                    Nueva Partida
                </button>
                <button id="btn-show-history" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-1.5 px-4 rounded transition duration-200 shadow border border-slate-600 text-sm">
                    📜 Historial Local
                </button>

                <div class="mt-1">
                    <p id="game-status" class="text-center text-sm font-medium text-emerald-300 bg-slate-900 py-2 rounded border border-slate-700">Esperando inicio...</p>
                </div>
            </div>

            <!-- Tablero Central y Relojes -->
            <div id="play-area" class="w-full lg:w-auto flex flex-col items-center order-1 lg:order-2">
                <div class="w-full max-w-[500px] flex justify-end mb-1 clock-panel">
                    <button id="btn-fullscreen" class="text-slate-400 hover:text-white flex items-center gap-1 text-xs bg-slate-800 px-2 py-1 rounded transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M5.828 10.172a.5.5 0 0 0-.707 0l-4.096 4.096V11.5a.5.5 0 0 0-1 0v3.975a.5.5 0 0 0 .5.5H4.5a.5.5 0 0 0 0-1H1.732l4.096-4.096a.5.5 0 0 0 0-.707zm4.344 0a.5.5 0 0 1 .707 0l4.096 4.096V11.5a.5.5 0 1 1 1 0v3.975a.5.5 0 0 1-.5.5H11.5a.5.5 0 0 1 0-1h2.768l-4.096-4.096a.5.5 0 0 1 0-.707zm0-4.344a.5.5 0 0 0 .707 0l4.096-4.096V4.5a.5.5 0 1 0 1 0V.525a.5.5 0 0 0-.5-.5H11.5a.5.5 0 0 0 0 1h2.768l-4.096 4.096a.5.5 0 0 0 0 .707zm-4.344 0a.5.5 0 0 1-.707 0L1.025 1.732V4.5a.5.5 0 0 1-1 0V.525a.5.5 0 0 1 .5-.5H4.5a.5.5 0 0 1 0 1H1.732l4.096 4.096a.5.5 0 0 1 0 .707z"/></svg>
                        Pantalla Completa
                    </button>
                </div>

                <div class="w-full max-w-[500px] flex justify-between items-center bg-slate-800 px-4 py-2 rounded-t-lg border-b-2 border-slate-900 clock-panel">
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-black rounded-full border border-slate-600"></span><span class="font-bold text-slate-300">Oponente</span></div>
                    <div id="clock-b" class="clock bg-slate-900 text-slate-200 font-mono text-xl md:text-2xl px-3 py-1 rounded border border-slate-700 w-24 text-center tracking-wider">--:--</div>
                </div>

                <div id="board-wrapper" class="board-wrapper style-plastico">
                    <div class="eval-bar-container" title="Evaluación Material">
                        <div id="eval-bar" class="eval-bar-black" style="height: 50%;"></div>
                        <div class="eval-bar-white"></div>
                    </div>
                    <div id="board" class="board-container"></div>
                </div>

                <div class="w-full max-w-[500px] flex justify-between items-center bg-slate-800 px-4 py-2 rounded-b-lg border-t-2 border-slate-900 clock-panel">
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-white rounded-full border border-slate-400"></span><span class="font-bold text-white">Tú (Blancas)</span></div>
                    <div id="clock-w" class="clock bg-slate-900 text-white font-mono text-xl md:text-2xl px-3 py-1 rounded border border-slate-700 w-24 text-center tracking-wider">--:--</div>
                </div>
            </div>

            <!-- Panel Derecho -->
            <div class="w-full lg:w-1/4 bg-slate-800 p-4 rounded-xl shadow-lg flex flex-col h-[400px] lg:h-[480px] order-3 lg:order-3">
                <div class="flex justify-between items-center mb-2 border-b border-slate-700 pb-2">
                    <h2 class="text-lg font-semibold text-white">Partida</h2>
                    <span id="material-score" class="font-mono text-sm bg-slate-900 px-2 py-1 rounded text-emerald-400">0.0</span>
                </div>

                <div class="flex gap-2 mb-3 mt-1">
                    <button id="btn-undo" class="flex-1 bg-slate-600 hover:bg-slate-500 text-white text-xs font-bold py-2 px-2 rounded transition duration-200 flex flex-col items-center">
                        <span>↩️</span> Deshacer
                    </button>
                    <button id="btn-surrender" class="flex-1 bg-red-600 hover:bg-red-500 text-white text-xs font-bold py-2 px-2 rounded transition duration-200 flex flex-col items-center">
                        <span>🏳️</span> Rendirse
                    </button>
                </div>

                <div class="mb-2">
                    <button id="btn-analyze" disabled class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 disabled:cursor-not-allowed text-white text-sm font-bold py-2 px-3 rounded flex justify-center items-center gap-2 shadow-lg transition duration-200 border border-blue-400 disabled:border-slate-600">
                        📊 Analizar Partida
                    </button>
                </div>

                <div id="move-history" class="flex-1 overflow-y-auto history-scroll bg-slate-900 rounded p-2 text-sm font-mono text-slate-300"></div>
            </div>
        </div>
    </div>

    <!-- MODAL DE ANÁLISIS GIGANTE -->
    <div id="analysis-modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-2 backdrop-blur-sm transition-opacity">
        <div class="bg-slate-800 rounded-xl shadow-2xl w-full h-full max-w-7xl max-h-full flex flex-col overflow-hidden border border-slate-600">
            <div class="p-3 border-b border-slate-700 flex justify-between items-center bg-slate-900 shrink-0">
                <h2 class="text-lg md:text-xl font-bold text-blue-400 flex items-center gap-2">🧠 Análisis Stockfish</h2>
                <button id="close-modal" class="text-slate-400 hover:text-white text-4xl leading-none">&times;</button>
            </div>
            <div id="analysis-content" class="p-2 overflow-hidden flex-1 bg-slate-800 relative flex flex-col">
                <!-- Se inyecta por JS -->
            </div>
        </div>
    </div>

    <!-- MODAL DE HISTORIAL DE PARTIDAS -->
    <div id="history-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-slate-800 rounded-xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col border border-slate-600 overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900">
                <h2 class="text-xl font-bold text-emerald-400 flex items-center gap-2">📜 Últimas 100 Partidas</h2>
                <button id="close-history-modal" class="text-slate-400 hover:text-white text-3xl leading-none">&times;</button>
            </div>
            <div id="history-list-content" class="p-4 overflow-y-auto flex-1 bg-slate-800 text-slate-200 space-y-3 history-scroll">
                <!-- Se inyecta por JS -->
            </div>
        </div>
    </div>

    <script>
        // --- INICIALIZACIÓN MOTOR STOCKFISH ---
        let sfWorker = null;
        let sfReady = false;
        let sfCallbacks = [];

        async function initStockfish() {
            try {
                const sfStatus = document.getElementById('sf-status');
                const res = await fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
                const code = await res.text();
                const blob = new Blob([code], {type: 'application/javascript'});
                sfWorker = new Worker(URL.createObjectURL(blob));
                
                sfWorker.onmessage = function(e) {
                    const msg = e.data;
                    if (msg === 'uciok') {
                        sfReady = true; sfStatus.textContent = 'Stockfish ✓'; sfStatus.classList.replace('text-slate-300', 'text-emerald-400');
                    }
                    if (msg.startsWith('info depth') && msg.includes('score')) {
                        const scoreMatch = msg.match(/score (cp|mate) (-?\d+)/);
                        if(scoreMatch && sfCallbacks.length > 0 && sfCallbacks[0].type === 'eval') {
                            sfCallbacks[0].latestScore = { type: scoreMatch[1], value: parseInt(scoreMatch[2]) };
                        }
                    }
                    if (msg.startsWith('bestmove')) {
                        const match = msg.match(/bestmove\s+(\S+)/);
                        if(sfCallbacks.length > 0) {
                            const cb = sfCallbacks.shift();
                            if (cb.type === 'move') cb.resolve(match ? match[1] : null);
                            else if (cb.type === 'eval') cb.resolve(cb.latestScore);
                        }
                    }
                };
                sfWorker.postMessage('uci');
            } catch (error) {
                console.error("Error Stockfish:", error);
                document.getElementById('sf-status').textContent = 'Error (Básico)';
            }
        }
        
        function getStockfishMove(fen, depth) {
            return new Promise(resolve => {
                if(!sfReady) resolve(null);
                sfCallbacks.push({type: 'move', resolve});
                sfWorker.postMessage(`position fen ${fen}`);
                sfWorker.postMessage(`go depth ${depth}`);
            });
        }

        function getStockfishEval(fen, depth) {
            return new Promise(resolve => {
                if(!sfReady) resolve({type: 'cp', value: 0});
                sfCallbacks.push({type: 'eval', resolve, latestScore: {type: 'cp', value: 0}});
                sfWorker.postMessage(`position fen ${fen}`);
                sfWorker.postMessage(`go depth ${depth}`);
            });
        }

        initStockfish();

        // --- LÓGICA PRINCIPAL ---
        let game = new Chess();
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('game-status');
        const historyElement = document.getElementById('move-history');
        const evalBar = document.getElementById('eval-bar');
        const materialScoreTxt = document.getElementById('material-score');
        
        let selectedSquare = null; let lastMove = null; let isThinking = false; let gameActive = false;
        let timeControl = { enabled: false, initialSecs: 0, incrementSecs: 0 };
        let timeLeft = { w: 0, b: 0 }; let turnStartTime = 0; let timerInterval = null;

        let analysisData = []; let currentAnalysisIndex = -1;

        const pieceUrls = {
            'w-p': 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg', 'w-n': 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg', 'w-b': 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg', 'w-r': 'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg', 'w-q': 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg', 'w-k': 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
            'b-p': 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg', 'b-n': 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg', 'b-b': 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg', 'b-r': 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg', 'b-q': 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg', 'b-k': 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg'
        };
        const pieceValues = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };

        // --- INTERFAZ BÁSICA ---
        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            const playArea = document.getElementById('play-area');
            if (!document.fullscreenElement) playArea.requestFullscreen?.() || playArea.webkitRequestFullscreen?.();
            else document.exitFullscreen?.();
        });
        document.addEventListener('fullscreenchange', () => { if (!document.fullscreenElement) document.getElementById('play-area').classList.remove('fullscreen-mode'); else document.getElementById('play-area').classList.add('fullscreen-mode'); });
        document.getElementById('piece-style').addEventListener('change', (e) => document.getElementById('board-wrapper').className = `board-wrapper style-${e.target.value}`);
        document.getElementById('time-control').addEventListener('change', (e) => document.getElementById('custom-time-div').classList.toggle('hidden', e.target.value !== 'custom'));

        function createBoard() {
            boardElement.innerHTML = ''; const columns = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
            for (let r = 8; r >= 1; r--) for (let c = 0; c < 8; c++) {
                const sq = document.createElement('div');
                sq.className = `square ${(r + c) % 2 === 0 ? 'square-light' : 'square-dark'}`;
                sq.id = columns[c] + r; sq.addEventListener('click', () => handleSquareClick(columns[c] + r));
                boardElement.appendChild(sq);
            }
            updateBoard();
        }

        function updateBoard() {
            const board = game.board(); const columns = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
            document.querySelectorAll('#board .square').forEach(sq => { sq.innerHTML = ''; sq.classList.remove('highlight', 'valid-move', 'last-move'); });
            if (lastMove) { document.getElementById(lastMove.from)?.classList.add('last-move'); document.getElementById(lastMove.to)?.classList.add('last-move'); }
            for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
                const piece = board[r][c];
                if (piece) {
                    const pDiv = document.createElement('div'); pDiv.className = 'piece';
                    pDiv.style.backgroundImage = `url('${pieceUrls[`${piece.color}-${piece.type}`]}')`;
                    document.getElementById(columns[c] + (8 - r)).appendChild(pDiv);
                }
            }
            if (selectedSquare) {
                document.getElementById(selectedSquare).classList.add('highlight');
                game.moves({ square: selectedSquare, verbose: true }).forEach(m => document.getElementById(m.to).classList.add('valid-move'));
            }
            updateStatus(); renderHistory(); updateEvaluation();
        }

        async function handleSquareClick(squareId) {
            if (game.game_over() || isThinking || !gameActive) return;
            const botDiff = parseInt(document.getElementById('bot-difficulty').value);
            if (botDiff > 0 && game.turn() === 'b') return;

            if (selectedSquare) {
                const moveObj = game.moves({ verbose: true }).find(m => m.from === selectedSquare && m.to === squareId);
                if (moveObj) {
                    executeMove(moveObj);
                    if (botDiff > 0 && !game.game_over()) {
                        isThinking = true; statusElement.innerHTML = `<span class="text-slate-400">Bot pensando...</span>`;
                        setTimeout(() => makeBotMove(botDiff), 50);
                    }
                } else {
                    const piece = game.get(squareId); selectedSquare = (piece && piece.color === game.turn()) ? squareId : null; updateBoard();
                }
            } else {
                const piece = game.get(squareId); if (piece && piece.color === game.turn()) { selectedSquare = squareId; updateBoard(); }
            }
        }

        function executeMove(moveObj) {
            const isFirstMove = game.history().length === 0;
            if (timeControl.enabled && !isFirstMove) timeLeft[game.turn()] += (timeControl.incrementSecs * 1000) - (performance.now() - turnStartTime);
            lastMove = game.move({ from: moveObj.from, to: moveObj.to, promotion: 'q' }); selectedSquare = null;
            if (timeControl.enabled) { if (isFirstMove) startTimer(); else turnStartTime = performance.now(); updateClockUI(); }
            updateBoard();
        }

        async function makeBotMove(level) {
            if(!gameActive) return; let move = null;
            if (level === 1) { const mvs = game.moves({ verbose: true }); move = mvs[Math.floor(Math.random() * mvs.length)]; }
            else if (level <= 4 || !sfReady) { move = getGreedyMove(); } 
            else if (level >= 5 && sfReady) {
                const bestSf = await getStockfishMove(game.fen(), level === 5 ? 3 : 10);
                if (bestSf) move = { from: bestSf.substring(0,2), to: bestSf.substring(2,4), promotion: bestSf.length > 4 ? bestSf[4] : 'q' };
                else move = game.moves({verbose:true})[0];
            }
            if (move && !game.game_over()) executeMove(move);
            isThinking = false;
        }

        function getGreedyMove() { const mvs = game.moves({verbose:true}); let best = mvs[0], maxV = -1; mvs.forEach(m => { if(m.captured && pieceValues[m.captured]>maxV){maxV=pieceValues[m.captured]; best=m;} }); return best; }

        function setupGameSettings() {
            const tcVal = document.getElementById('time-control').value;
            if (tcVal === "0") { timeControl.enabled = false; document.getElementById('clock-w').textContent = "∞"; document.getElementById('clock-b').textContent = "∞"; } 
            else {
                timeControl.enabled = true;
                if (tcVal === "custom") { timeControl.initialSecs = parseInt(document.getElementById('custom-min').value) * 60; timeControl.incrementSecs = parseInt(document.getElementById('custom-inc').value); } 
                else { const parts = tcVal.split(','); timeControl.initialSecs = parseInt(parts[0]) * 60; timeControl.incrementSecs = parseInt(parts[1]); }
                timeLeft = { w: timeControl.initialSecs * 1000, b: timeControl.initialSecs * 1000 }; updateClockUI();
            }
        }

        function startTimer() { if (!timeControl.enabled || timerInterval) return; turnStartTime = performance.now(); timerInterval = requestAnimationFrame(tickTimer); }
        function tickTimer() {
            if (!gameActive || game.game_over()) return;
            const activeColor = game.turn(); let dispTime = timeLeft[activeColor] - (performance.now() - turnStartTime);
            if (dispTime <= 0) { timeLeft[activeColor] = 0; gameActive = false; updateClockUI(); endGame(`¡Tiempo Agotado! Ganan las <span class="font-bold">${activeColor === 'w' ? 'Negras' : 'Blancas'}</span>.`); return; }
            updateClockUI(dispTime); timerInterval = requestAnimationFrame(tickTimer);
        }
        function formatTime(ms) {
            if(ms < 0) ms = 0; const t = ms / 1000; const m = Math.floor(t / 60); const s = Math.floor(t % 60);
            return (t < 10 && t > 0) ? `00:0${s}.${Math.floor((ms % 1000) / 100)}` : `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
        function updateClockUI(actDisp = null) {
            if (!timeControl.enabled) return;
            let dw = timeLeft.w; let db = timeLeft.b;
            if (gameActive && actDisp !== null) { if (game.turn() === 'w') dw = actDisp; else db = actDisp; }
            const cw = document.getElementById('clock-w'); const cb = document.getElementById('clock-b');
            cw.textContent = formatTime(dw); cb.textContent = formatTime(db);
            cw.classList.toggle('low-time', dw < 10000 && dw > 0); cb.classList.toggle('low-time', db < 10000 && db > 0);
        }

        function evaluateMaterialOnly(board) {
            let score = 0;
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(board[r][c]) score += (board[r][c].color==='w'?1:-1) * pieceValues[board[r][c].type];
            return score;
        }

        function updateEvaluation() {
            const score = evaluateMaterialOnly(game.board());
            materialScoreTxt.textContent = score > 0 ? `+${(score/10).toFixed(1)}` : (score < 0 ? (score/10).toFixed(1) : "0.0");
            evalBar.style.height = `${Math.max(5, Math.min(95, 50 - (score / 60) * 50))}%`;
        }

        function renderHistory() {
            let html = ''; const h = game.history();
            for (let i = 0; i < h.length; i += 2) html += `<div class="grid grid-cols-6 hover:bg-slate-800 p-1 rounded border-b border-slate-800"><span class="text-slate-500 col-span-1">${Math.floor(i / 2) + 1}.</span><span class="col-span-2 font-bold text-white">${h[i]}</span><span class="col-span-3 text-slate-300">${h[i+1]||''}</span></div>`;
            historyElement.innerHTML = html; historyElement.scrollTop = historyElement.scrollHeight;
        }

        // --- SISTEMA DE HISTORIAL (100 Partidas) ---
        function saveGameToHistory(statusMessage) {
            if (game.history().length < 2) return; // No guardar si movieron menos de 2 veces
            let h = JSON.parse(localStorage.getItem('ajedrez_pro_history') || '[]');
            const botSel = document.getElementById('bot-difficulty');
            const oppName = botSel.options[botSel.selectedIndex].text;
            
            const gameRecord = {
                date: new Date().toLocaleString(),
                moves: game.history(),
                status: statusMessage.replace(/<[^>]*>?/gm, ''), // Quitar tags HTML
                opponent: oppName
            };
            h.unshift(gameRecord);
            if (h.length > 100) h = h.slice(0, 100);
            localStorage.setItem('ajedrez_pro_history', JSON.stringify(h));
        }

        document.getElementById('btn-show-history').addEventListener('click', () => {
            const h = JSON.parse(localStorage.getItem('ajedrez_pro_history') || '[]');
            const listContent = document.getElementById('history-list-content');
            if (h.length === 0) {
                listContent.innerHTML = `<p class="text-center text-slate-400 mt-10">Aún no hay partidas guardadas.</p>`;
            } else {
                listContent.innerHTML = h.map((g, index) => `
                    <div class="bg-slate-700/50 p-3 rounded-lg border border-slate-600 flex justify-between items-center">
                        <div>
                            <div class="text-sm font-bold text-emerald-400">${g.status}</div>
                            <div class="text-xs text-slate-400 mt-1">🆚 ${g.opponent} • 📅 ${g.date} • ♟️ ${g.moves.length} jugadas</div>
                        </div>
                        <button onclick="loadHistoryGame(${index})" class="bg-blue-600 hover:bg-blue-500 text-white text-xs px-3 py-2 rounded shadow transition">
                            Re-Analizar
                        </button>
                    </div>
                `).join('');
            }
            document.getElementById('history-modal').classList.remove('hidden');
        });

        document.getElementById('close-history-modal').addEventListener('click', () => document.getElementById('history-modal').classList.add('hidden'));

        window.loadHistoryGame = function(index) {
            const h = JSON.parse(localStorage.getItem('ajedrez_pro_history') || '[]');
            const record = h[index];
            if(record) {
                document.getElementById('history-modal').classList.add('hidden');
                runPostGameAnalysis(record.moves);
            }
        };

        // --- GESTIÓN FIN DE PARTIDA ---
        function endGame(statusMessage) {
            gameActive = false; if(timerInterval) { cancelAnimationFrame(timerInterval); timerInterval = null; }
            statusElement.innerHTML = statusMessage; statusElement.classList.replace('bg-slate-900', 'bg-blue-900/50'); statusElement.classList.add('animate-pulse');
            document.getElementById('btn-analyze').disabled = false; document.getElementById('btn-analyze').classList.add('animate-bounce');
            document.getElementById('setup-panel').classList.replace('border-transparent', 'border-emerald-500');
            setTimeout(() => document.getElementById('setup-panel').classList.replace('border-emerald-500', 'border-transparent'), 3000);
            
            saveGameToHistory(statusMessage);
        }

        function updateStatus() {
            if (!gameActive) return;
            if (game.in_checkmate()) endGame(`¡Jaque Mate! Ganan las <span class="font-bold">${game.turn() === 'w' ? 'Negras' : 'Blancas'}</span>.`);
            else if (game.in_draw()) endGame('Empate por Rey Ahogado o Regla.');
            else {
                let msg = `Turno de las <span class="font-bold">${game.turn() === 'w' ? 'Blancas' : 'Negras'}</span>`;
                if (game.in_check()) msg += ' <span class="text-red-500 font-bold ml-1">(¡Jaque!)</span>';
                statusElement.innerHTML = msg;
            }
        }

        // --- ANÁLISIS GIGANTE ESTRICTO ---
        document.getElementById('btn-analyze').addEventListener('click', () => {
            const h = game.history({ verbose: true }).map(m => m.san); // Pasamos array de SAN strings
            if(h.length === 0) { alert("No hay jugadas."); return; }
            if(!sfReady) { alert("Stockfish no está disponible."); return; }
            document.getElementById('btn-analyze').classList.remove('animate-bounce');
            runPostGameAnalysis(h);
        });
        document.getElementById('close-modal').addEventListener('click', () => document.getElementById('analysis-modal').classList.add('hidden'));

        function scoreToCp(scoreObj) { return scoreObj.type === 'mate' ? (scoreObj.value > 0 ? 10000 - scoreObj.value : -10000 - scoreObj.value) : scoreObj.value; }

        async function runPostGameAnalysis(movesSanArray) {
            document.getElementById('analysis-modal').classList.remove('hidden');
            const content = document.getElementById('analysis-content');
            
            content.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-blue-400">
                    <svg class="animate-spin h-12 w-12 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <p class="text-xl font-bold mb-3 text-center">Analizando profundamente...</p>
                    <div class="w-full max-w-md bg-slate-700 rounded-full h-3 mb-2"><div id="sf-progress" class="bg-blue-500 h-3 rounded-full progress-bar" style="width: 0%"></div></div>
                    <p id="sf-progress-txt" class="text-sm text-slate-400 font-mono">0 / ${movesSanArray.length}</p>
                </div>`;

            let tempGame = new Chess(); analysisData = []; 
            let stats = { brilliant: 0, best: 0, excellent: 0, good: 0, inaccuracy: 0, mistake: 0, blunder: 0 };

            for (let i = 0; i < movesSanArray.length; i++) {
                const moveStr = movesSanArray[i];
                const preEvalCp = scoreToCp(await getStockfishEval(tempGame.fen(), 6));
                const preMat = evaluateMaterialOnly(tempGame.board()); // Material puro
                
                const moveObj = tempGame.move(moveStr);
                const currentFen = tempGame.fen();
                
                const postEvalCp = scoreToCp(await getStockfishEval(currentFen, 6));
                const postMat = evaluateMaterialOnly(tempGame.board());

                // Delta de Eval y Delta de Material puro
                let sfDelta = moveObj.color === 'w' ? (postEvalCp - preEvalCp) : (preEvalCp - postEvalCp);
                let matDelta = moveObj.color === 'w' ? (postMat - preMat) : (preMat - postMat);

                let label = 'Buena'; let cssColor = 'text-slate-400'; let badgeText = ''; let badgeClass = '';

                // Lógica Estricta de Brillantes (Sacrificio real o jugada ultra profunda)
                let isBrilliant = false;
                // Sacrificó pieza menor o 3 peones pero la posición se mantuvo igual o mejoró
                if (matDelta <= -30 && sfDelta > -50) isBrilliant = true;
                // Sacrificó un peón pero ganó enorme ventaja estratégica
                if (matDelta <= -10 && sfDelta > 150) isBrilliant = true;
                // Jugada celestial (+3 peones de ventaja súbita)
                if (sfDelta >= 300) isBrilliant = true;

                if (isBrilliant) { label = 'Brillante'; badgeText = '!!'; badgeClass = 'bg-cyan-500'; cssColor = 'text-cyan-400'; stats.brilliant++; }
                else if (sfDelta <= -300) { label = 'Grave'; badgeText = '??'; badgeClass = 'bg-red-500'; cssColor = 'text-red-500'; stats.blunder++; }
                else if (sfDelta <= -100) { label = 'Error'; badgeText = '?'; badgeClass = 'bg-orange-500'; cssColor = 'text-orange-500'; stats.mistake++; }
                else if (sfDelta <= -40) { label = 'Imprecisa'; badgeText = '?!'; badgeClass = 'bg-yellow-500'; cssColor = 'text-yellow-500'; stats.inaccuracy++; }
                else if (sfDelta >= -10 && sfDelta <= 50 && !isBrilliant) { label = 'Mejor'; badgeText = '★'; badgeClass = 'bg-green-500'; cssColor = 'text-green-500'; stats.best++; }
                else if (sfDelta > -40 && !isBrilliant) { label = 'Excelente'; badgeText = '✓'; badgeClass = 'bg-lime-500'; cssColor = 'text-lime-400'; stats.excellent++; }
                else { stats.good++; }

                analysisData.push({ moveIndex: i, moveObj: moveObj, fen: currentFen, san: moveObj.san, color: moveObj.color, label, cssColor, badgeText, badgeClass });

                document.getElementById('sf-progress').style.width = `${((i+1)/movesSanArray.length)*100}%`;
                document.getElementById('sf-progress-txt').textContent = `${i+1} / ${movesSanArray.length}`;
            }
            renderInteractiveAnalysisView(stats);
        }

        function renderInteractiveAnalysisView(stats) {
            const content = document.getElementById('analysis-content');
            const currentStyle = document.getElementById('piece-style').value;
            
            let listHtml = '';
            for(let i=0; i<analysisData.length; i++){
                const data = analysisData[i];
                listHtml += `
                    <div id="ana-row-${i}" class="flex justify-between items-center bg-slate-700/30 hover:bg-slate-600/50 p-2 rounded border-l-4 border-transparent cursor-pointer transition-colors" onclick="goToAnalysisMove(${i})">
                        <div class="flex items-center gap-2">
                            <span class="font-mono text-slate-500 text-xs w-8">${Math.floor(i/2) + 1}.${data.color === 'w' ? 'B' : 'N'}</span>
                            <span class="font-bold text-sm text-white">${data.san}</span>
                            ${data.badgeText ? `<span class="${data.badgeClass} text-white px-1.5 rounded text-[0.6rem] font-bold">${data.badgeText}</span>` : ''}
                        </div>
                        <div class="${data.cssColor} font-semibold text-[0.65rem] tracking-wide uppercase">${data.label}</div>
                    </div>`;
            }

            // Layout Adaptativo: Tablero GIGANTE, Lista scrolleable pequeña
            content.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-4 h-full w-full max-h-full">
                    
                    <!-- Tablero Interactivo (Ocupa la mayoría) -->
                    <div class="flex-1 flex flex-col items-center justify-start bg-slate-900 rounded-lg p-2 shadow-inner overflow-hidden">
                        <div class="analysis-board-wrapper style-${currentStyle} relative mb-2">
                            <div id="analysis-board" class="board-container w-full h-full"></div>
                        </div>
                        
                        <!-- Controles -->
                        <div class="flex gap-1 md:gap-3 w-full max-w-sm bg-slate-800 p-2 rounded shadow border border-slate-700 justify-center">
                            <button onclick="goToAnalysisMove(-1)" class="p-2 bg-slate-700 rounded text-white text-xs md:text-sm shadow">⏮️ Inicio</button>
                            <button onclick="goToAnalysisMove(currentAnalysisIndex - 1)" class="p-2 bg-slate-700 rounded text-white text-xs md:text-sm shadow">◀️ Atrás</button>
                            <button onclick="goToAnalysisMove(currentAnalysisIndex + 1)" class="p-2 bg-slate-700 rounded text-white text-xs md:text-sm shadow">Sig ▶️</button>
                            <button onclick="goToAnalysisMove(analysisData.length - 1)" class="p-2 bg-slate-700 rounded text-white text-xs md:text-sm shadow">Fin ⏭️</button>
                        </div>
                    </div>

                    <!-- Panel Lateral -->
                    <div class="w-full lg:w-80 flex flex-col h-48 lg:h-full bg-slate-900 rounded-lg border border-slate-700 shrink-0 overflow-hidden">
                        <div class="grid grid-cols-4 gap-0 p-1 bg-slate-800 border-b border-slate-700">
                            <div class="text-center"><div class="text-lg text-cyan-400 font-bold">!! ${stats.brilliant}</div></div>
                            <div class="text-center"><div class="text-lg text-green-500 font-bold">★ ${stats.best}</div></div>
                            <div class="text-center"><div class="text-lg text-orange-500 font-bold">? ${stats.mistake}</div></div>
                            <div class="text-center"><div class="text-lg text-red-500 font-bold">?? ${stats.blunder}</div></div>
                        </div>
                        <div id="ana-list-container" class="flex-1 overflow-y-auto p-2 space-y-1 history-scroll">
                            ${listHtml}
                        </div>
                    </div>
                </div>
            `;
            goToAnalysisMove(-1);
        }

        window.goToAnalysisMove = function(index) {
            if (index < -1) index = -1; if (index >= analysisData.length) index = analysisData.length - 1;
            currentAnalysisIndex = index;
            let fen = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
            let moveInfo = null;
            if (index >= 0) { moveInfo = analysisData[index]; fen = moveInfo.fen; }

            const boardEl = document.getElementById('analysis-board'); if (!boardEl) return;
            boardEl.innerHTML = '';
            let tempGame = new Chess(fen); const board = tempGame.board(); const cols = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const squareId = cols[c] + (8 - r);
                    const sqDiv = document.createElement('div');
                    sqDiv.className = `square ${((8-r) + c) % 2 !== 0 ? 'square-dark' : 'square-light'}`;
                    if (moveInfo && (moveInfo.moveObj.from === squareId || moveInfo.moveObj.to === squareId)) sqDiv.classList.add('last-move');

                    if (board[r][c]) {
                        const pDiv = document.createElement('div'); pDiv.className = 'piece';
                        pDiv.style.backgroundImage = `url('${pieceUrls[`${board[r][c].color}-${board[r][c].type}`]}')`;
                        sqDiv.appendChild(pDiv);
                    }
                    if (moveInfo && moveInfo.moveObj.to === squareId && moveInfo.badgeText !== '') {
                        const badge = document.createElement('div'); badge.className = `badge-eval ${moveInfo.badgeClass}`;
                        badge.textContent = moveInfo.badgeText; sqDiv.appendChild(badge);
                    }
                    boardEl.appendChild(sqDiv);
                }
            }

            document.querySelectorAll('[id^="ana-row-"]').forEach(el => { el.classList.replace('border-blue-500', 'border-transparent'); el.classList.remove('bg-blue-900/60'); });
            if (index >= 0) {
                const row = document.getElementById(`ana-row-${index}`);
                if (row) { row.classList.add('bg-blue-900/60'); row.classList.replace('border-transparent', 'border-blue-500'); row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
            }
        };

        // --- CONTROLES GENERALES ---
        document.getElementById('btn-new-game').addEventListener('click', () => {
            if(gameActive && !confirm("¿Abandonar partida actual?")) return;
            game.reset(); selectedSquare = null; lastMove = null; gameActive = true; isThinking = false;
            document.getElementById('btn-analyze').disabled = true; statusElement.classList.replace('bg-blue-900/50', 'bg-slate-900'); statusElement.classList.remove('animate-pulse');
            setupGameSettings(); updateBoard(); statusElement.innerHTML = `Turno de las <span class="font-bold">Blancas</span>`;
        });
        document.getElementById('btn-undo').addEventListener('click', () => {
            if (!gameActive || game.history().length === 0 || isThinking) return;
            game.undo(); if (parseInt(document.getElementById('bot-difficulty').value) > 0 && game.turn() === 'b' && game.history().length > 0) game.undo();
            selectedSquare = null; lastMove = null; if (timeControl.enabled) turnStartTime = performance.now(); updateBoard();
        });
        document.getElementById('btn-surrender').addEventListener('click', () => {
            if (!gameActive || isThinking) return;
            if (confirm("¿Estás seguro de que quieres rendirte?")) endGame(`¡Te has rendido! Ganan las <span class="font-bold">${game.turn() === 'w' ? 'Negras' : 'Blancas'}</span>.`);
        });

        // Configuración de PWA Offline (Ahora funcionará gracias al sw.js limpio)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').then(() => console.log('PWA Lista')).catch(e => console.log('Error PWA', e)));
        }

        createBoard(); setupGameSettings();
    </script>
</body>
</html>
